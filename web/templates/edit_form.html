<div>
  <div class="section-header">
    <div>
      <span class="eyebrow">Update rule</span>
      <h2>Edit Forwarding Rule</h2>
    </div>
  </div>

  <form method="POST" action="/forwarding/update" class="edit-rule-form">
    <input type="hidden" name="source" value="{{.Source}}">
    <label class="static-field">
      Source
      <strong>{{.Source}}</strong>
    </label>

    <label>
      <div class="field-label">Target URL</div>
      <input type="url" name="target" value="{{.Target}}" required>
    </label>

    <div class="section">
      <div class="section-title">Incoming HMAC</div>
      <label>
        <div class="field-label">New signing secret</div>
        <input type="password" name="verify_secret" placeholder="{{if .VerifySecret}}Leave blank to keep current secret{{else}}Stripe signing secret (whsec_...){{end}}"
               autocomplete="off" data-lpignore="true">
      </label>
      <label>
        <div class="field-label">Signature header</div>
        <input type="text" name="verify_header" value="{{.VerifyHeader}}"
               placeholder="Stripe-Signature">
      </label>
      <label>
        <div class="field-label">Tolerance, seconds</div>
        <input type="number" name="tolerance" value="{{if gt .ToleranceSeconds 0}}{{.ToleranceSeconds}}{{end}}" min="0" step="1"
               placeholder="{{if .VerifySecret}}Leave blank to keep current{{else}}300{{end}}">
      </label>
      {{if .VerifySecret}}
      <label class="checkbox-row">
        <input type="checkbox" name="clear_verify_secret" value="1">
        Clear incoming HMAC secret
      </label>
      {{end}}
    </div>

    <div class="section">
      <div class="section-title">Sign outgoing delivery</div>
      <label>
        <div class="field-label">New outgoing secret</div>
        <input type="password" name="outgoing_secret" placeholder="{{if .OutgoingSecret}}Leave blank to keep current secret{{else}}Secret to sign outgoing deliveries{{end}}"
               autocomplete="off" data-lpignore="true">
      </label>
      {{if .OutgoingSecret}}
      <label class="checkbox-row">
        <input type="checkbox" name="clear_outgoing_secret" value="1">
        Clear outgoing HMAC secret
      </label>
      {{end}}
      <div class="helper-text">Header: X-WebhookHub-Signature (t=..., v1=...)</div>
    </div>

    <div class="section">
      <div class="section-title">Delivery retry policy</div>
      <label>
        <div class="field-label">Max attempts</div>
        <input type="number" name="retry_max_attempts" value="{{if gt .RetryMaxAttempts 0}}{{.RetryMaxAttempts}}{{else}}3{{end}}" min="1" step="1">
      </label>
      <label>
        <div class="field-label">Initial backoff, seconds</div>
        <input type="number" name="retry_backoff_seconds" value="{{if gt .RetryBackoffSeconds 0}}{{.RetryBackoffSeconds}}{{else}}2{{end}}" min="1" step="1">
      </label>
      <div class="helper-text">Backoff grows exponentially between attempts and is capped to keep delivery responsive.</div>
    </div>

    <button type="submit" class="btn-primary">Save Changes</button>
  </form>
</div>
